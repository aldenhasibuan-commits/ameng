<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasi Partikel Hati</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        svg { display: none; }
    </style>
</head>
<body>

    <!-- Template bentuk hati -->
    <svg viewBox="0 0 600 552">
        <path id="heart-path" d="M300,521.1L267.7,489.2C106.3,342.3,0,245.3,0,128.5C0,33.3,74.1,0,148.2,0c41.8,0,81.9,19.4,108.4,50.1 c26.5-30.7,66.6-50.1,108.4-50.1C439.1,0,513.2,33.3,513.2,128.5c0,116.8-106.3,213.8-267.7,360.8L300,521.1z"></path>
    </svg>

    <!-- Library yang dibutuhkan (Sudah diperbaiki) -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        // 1. SETUP DASAR
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 400;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. MENGAMBIL TITIK DARI SVG
        const path = document.querySelector("#heart-path");
        const length = path.getTotalLength();
        const vertices = [];
        const initialPositions = [];

        // Buat 1500 partikel mengikuti alur hati
        for (let i = 0; i < length; i += 0.4) {
            const point = path.getPointAtLength(i);
            
            // Atur posisi agar di tengah
            const x = point.x - 300;
            const y = -point.y + 276;
            const z = (Math.random() - 0.5) * 50;

            const vector = new THREE.Vector3(x, y, z);
            vertices.push(vector);
            
            // Simpan posisi awal untuk animasi meledak
            initialPositions.push({ x: 0, y: 0, z: 0 });
        }

        const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
        const material = new THREE.PointsMaterial({ 
            color: 0xff4d6d, // Warna Pink Hati
            size: 2, 
            blending: THREE.AdditiveBlending 
        });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // 3. ANIMASI GSAP (EFEK MELEDAK JADI HATI)
        vertices.forEach((v, i) => {
            gsap.from(v, {
                x: 0,
                y: 0,
                z: 0,
                duration: Math.random() * 3 + 2,
                ease: "power2.out",
                delay: Math.random() * 1
            });
        });

        // Rotasi otomatis agar terlihat 3D
        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.005;
            geometry.setFromPoints(vertices); // Update posisi partikel
            renderer.render(scene, camera);
        }
        animate();

        // 4. RESPONSIF LAYAR
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
