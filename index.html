<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Heart</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        // Set ukuran canvas penuh layar
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let angle = 0;
        const text = "I love you";
        const numSteps = 70;
        const scale = 25; // Skala ukuran hati

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.fillStyle = "rgb(255, 51, 128)"; // Warna merah muda pink
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let i = 0; i < numSteps; i++) {
                // Rumus matematika hati yang sama persis seperti di Python
                let t = i * (2 * Math.PI / numSteps) + (angle * Math.PI / 180);
                
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

                // Hitung posisi koordinat di canvas
                let posX = (x * scale) + centerX;
                let posY = (-y * scale) + centerY; // Dibalik karena sumbu Y di web berlawanan arah

                ctx.fillText(text, posX, posY);
            }

            angle += 1.2; // Kecepatan putaran rotasi
            requestAnimationFrame(draw);
        }

        draw();

        // Penyesuaian jika ukuran layar browser berubah
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
