<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Heart - Amengg Lucukk</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let angle = 0;
        const heartText = "I love you";
        const centerName = "amengg lucukk"; // Nama sudah diganti sesuai request
        const numSteps = 70;
        const scale = 25; 

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // --- BAGIAN NAMA DI TENGAH ---
            // Efek detak jantung (pulsing)
            const pulse = 1 + Math.sin(angle * Math.PI / 60) * 0.1; 
            
            ctx.save(); // Simpan state canvas
            ctx.fillStyle = "#ffffff"; // Warna putih agar kontras
            ctx.font = `bold ${Math.floor(28 * pulse)}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // Efek cahaya pink di belakang nama
            ctx.shadowBlur = 20;
            ctx.shadowColor = "rgb(255, 51, 128)";
            ctx.fillText(centerName, centerX, centerY);
            ctx.restore(); // Kembalikan state canvas agar tidak mempengaruhi teks hati

            // --- BAGIAN HATI ---
            ctx.fillStyle = "rgb(255, 51, 128)";
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let i = 0; i < numSteps; i++) {
                let t = i * (2 * Math.PI / numSteps) + (angle * Math.PI / 180);
                
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

                let posX = (x * scale) + centerX;
                let posY = (-y * scale) + centerY;

                ctx.fillText(heartText, posX, posY);
            }

            angle += 1.2;
            requestAnimationFrame(draw);
        }

        draw();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
