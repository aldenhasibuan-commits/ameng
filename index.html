<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Heart Animation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        /* Sembunyikan SVG asli, kita hanya butuh jalurnya */
        svg { display: none; }
    </style>
</head>
<body>

    <!-- SVG Path Hati sebagai referensi bentuk -->
    <svg viewBox="0 0 600 552">
        <path id="heart-path" d="M300,521.1L267.7,489.2C106.3,342.3,0,245.3,0,128.5C0,33.3,74.1,0,148.2,0c41.8,0,81.9,19.4,108.4,50.1 c26.5-30.7,66.6-50.1,108.4-50.1C439.1,0,513.2,33.3,513.2,128.5c0,116.8-106.3,213.8-267.7,360.8L300,521.1z"></path>
    </svg>

    <!-- Library yang dibutuhkan -->
    <script src="https://cloudflare.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        console.clear();

        /* SETUP */
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.z = 500;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 2 : 1);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        /* CONTROLS */
        const controlsWebGL = new THREE.OrbitControls(camera, renderer.domElement);

        /* PARTICLES */
        const tl = gsap.timeline({ repeat: -1, yoyo: true });
        const path = document.querySelector("#heart-path");
        const length = path.getTotalLength();
        const vertices = [];

        for (let i = 0; i < length; i += 1.5) { // Jarak antar titik diperbesar sedikit agar performa lancar
            const point = path.getPointAtLength(i);
            const vector = new THREE.Vector3(point.x, -point.y, 0);
            
            vector.x += (Math.random() - 0.5) * 30;
            vector.y += (Math.random() - 0.5) * 30;
            vector.z += (Math.random() - 0.5) * 70;
            
            vertices.push(vector);

            tl.from(vector, {
                x: 300, // Sesuai pusat viewBox SVG
                y: -276, 
                z: 0,
                ease: "power2.inOut",
                duration: "random(2, 5)"
            }, i * 0.002);
        }

        const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
        const material = new THREE.PointsMaterial({ color: 0xee5282, blending: THREE.AdditiveBlending, size: 3 });
        const particles = new THREE.Points(geometry, material);

        // Menyeimbangkan posisi ke tengah layar
        particles.position.x -= 300;
        particles.position.y += 276;
        scene.add(particles);

        gsap.fromTo(scene.rotation, { y: -0.2 }, {
            y: 0.2,
            repeat: -1,
            yoyo: true,
            ease: 'power2.inOut',
            duration: 3
        });

        /* RENDERING */
        function render() {
            requestAnimationFrame(render);
            geometry.setFromPoints(vertices); // Update posisi titik yang dianimasikan GSAP
            renderer.render(scene, camera);
        }
        render();

        /* EVENTS */
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
