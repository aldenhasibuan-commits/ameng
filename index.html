<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Animation</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffebee;
            font-family: 'Arial', sans-serif;
            margin: 0;
        }

        .heart {
            font-size: 100px;
            color: #e91e63;
            animation: pulse 1.2s infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #ad1457;
            margin-top: 20px;
        }

        #show-code {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #e91e63;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        #show-code:hover {
            background-color: #c2185b;
        }

        pre {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            max-width: 90%;
            overflow-x: auto;
            display: none; /* Sembunyi di awal */
            margin-top: 20px;
            font-size: 12px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="heart">❤️</div>
    <h1>I Love You!</h1>

    <button id="show-code">Klik untuk Lihat Codingan</button>

    <pre id="code-display"></pre>

    <script>
        const btn = document.getElementById('show-code');
        const display = document.getElementById('code-display');

        btn.addEventListener('click', () => {
            // Mengambil seluruh isi HTML dari dokumen ini
            const sourceCode = document.documentElement.outerHTML;
            
            // Menampilkan dalam tag <pre>
            display.textContent = sourceCode;
            display.style.display = 'block';
            
            // Scroll otomatis ke bawah agar kode terlihat
            display.scrollIntoView({ behavior: 'smooth' });
            
            btn.innerText = "Ini Kodenya! ✨";
        });
    </script>

</body>
</html>
